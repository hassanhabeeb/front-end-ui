server {
    listen 80;

    # Using 'root' instead of 'alias' is much more stable for sub-paths
    location /front-end-ui/ {
        root /usr/share/nginx;
        index index.html;
        try_files $uri $uri/ /front-end-ui/index.html;
    }

    # Redirect root traffic to the sub-path so you don't see a 404 at the IP level
    location / {
        return 301 /front-end-ui/;
    }
}
